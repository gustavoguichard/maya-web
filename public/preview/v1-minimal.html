<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>V1 · Minimalista — Kin Maia</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #111114;
      --ink-soft: #6b6b72;
      --ink-faint: #d7d7dc;
      --rule: #eaeaee;

      --c-vermelho: #d94040;
      --c-branco:   #888;
      --c-azul:     #2d63c8;
      --c-amarelo:  #c99514;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0c0e;
        --ink: #f2f2f5;
        --ink-soft: #9a9aa3;
        --ink-faint: #2a2a30;
        --rule: #1d1d22;
      }
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 15px/1.55 ui-sans-serif, -apple-system, "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 5rem;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--ink-soft);
      margin-bottom: 3rem;
      letter-spacing: 0.04em;
    }
    .nav a { color: inherit; text-decoration: none; }
    .nav a:hover { color: var(--ink); }

    h1 {
      font-size: 1.35rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin: 0 0 0.25rem;
    }
    .sub {
      color: var(--ink-soft);
      font-size: 0.9rem;
      margin: 0 0 2.5rem;
    }

    form {
      display: flex;
      gap: 0.5rem;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      padding: 0.85rem 0;
      margin-bottom: 3rem;
    }
    input[type="date"] {
      flex: 1;
      font: inherit;
      color: var(--ink);
      background: transparent;
      border: 0;
      padding: 0.25rem;
    }
    input[type="date"]:focus { outline: none; }
    button {
      font: inherit;
      font-weight: 500;
      color: var(--bg);
      background: var(--ink);
      border: 0;
      padding: 0.5rem 1rem;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .kc { padding: 1.25rem 0 1.5rem; }
    .kc__top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 1.5rem;
    }
    .kc__dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: 1px;
    }
    .kc--vermelho .kc__dot { background: var(--c-vermelho); }
    .kc--branco   .kc__dot { background: var(--c-branco); }
    .kc--azul     .kc__dot { background: var(--c-azul); }
    .kc--amarelo  .kc__dot { background: var(--c-amarelo); }

    .kc__name {
      font-size: 2.75rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      margin: 0 0 1rem;
    }
    .kc__tone-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      border-top: 1px solid var(--rule);
    }
    .tone-glyph { fill: var(--ink); width: 48px; }
    .kc__tone-text { font-size: 0.95rem; color: var(--ink-soft); }
    .kc__tone-text b { color: var(--ink); font-weight: 500; }

    .section {
      border-top: 1px solid var(--rule);
      padding: 1.25rem 0;
    }
    .section h2 {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin: 0 0 0.85rem;
      font-weight: 500;
    }

    .rel {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0.5rem 1rem;
    }
    .rel dt { color: var(--ink-soft); font-size: 0.85rem; }
    .rel dd { margin: 0; font-size: 0.95rem; }

    .list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem 1.5rem;
    }
    .list li { font-size: 0.9rem; }
    .list__num { color: var(--ink-faint); margin-right: 0.5rem; font-variant-numeric: tabular-nums; }
    .list__strong { color: var(--ink); font-weight: 500; }

    .fam { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .fam__chip {
      font-size: 0.8rem;
      padding: 0.25rem 0.65rem;
      border: 1px solid var(--rule);
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <main>
    <div class="nav">
      <span>V1 · Minimalista</span>
      <a href="index.html">Ver os 5 layouts →</a>
    </div>

    <h1>Calculadora do Kin Maia</h1>
    <p class="sub">Tzolkin · 260 dias · 20 selos · 13 tons</p>

    <form id="form" autocomplete="off">
      <input type="date" id="date" required aria-label="Data">
      <button type="submit">Calcular</button>
    </form>

    <section id="result" aria-live="polite"></section>
  </main>

  <script type="module">
    import { setupForm, toneSvg, prettyKin, parseKinName, escape,
             SEAL_PT, TONE_PT, TONE_NUMBER, COLOR_CSS } from './shared.js';

    setupForm((info) => {
      const colorClass = COLOR_CSS[info.color] ?? 'azul';
      const toneNum = TONE_NUMBER[info.tone] ?? 1;
      const currentSeal = info.seal;

      const rel = (label, kin) => `<dt>${label}</dt><dd>${escape(prettyKin(kin))}</dd>`;

      const waveItem = (kin, i) => {
        const { seal } = parseKinName(kin);
        const current = seal === currentSeal;
        return `<li><span class="list__num">${String(i + 1).padStart(2, '0')}</span><span${current ? ' class="list__strong"' : ''}>${escape(prettyKin(kin))}</span></li>`;
      };

      return `
        <article class="kc kc--${colorClass}">
          <div class="kc__top">
            <span>Kin ${info.number} / 260</span>
            <span><span class="kc__dot"></span>${escape(info.color)}</span>
          </div>
          <h2 class="kc__name">${escape(SEAL_PT[info.seal] ?? info.seal)}</h2>
          <div class="kc__tone-row">
            ${toneSvg(toneNum, { width: 48, dotR: 3.5, dotGap: 5, barH: 5, barW: 34, gap: 3 })}
            <div class="kc__tone-text">Tom <b>${toneNum} · ${escape(TONE_PT[info.tone] ?? info.tone)}</b></div>
          </div>
        </article>

        <section class="section">
          <h2>Relações</h2>
          <dl class="rel">
            ${rel('Guia', info.guide)}
            ${rel('Análogo', info.analog)}
            ${rel('Antípoda', info.antipode)}
            ${rel('Oculto', info.hidden)}
          </dl>
        </section>

        <section class="section">
          <h2>Onda Encantada</h2>
          <ol class="list">${info.wavespell.map(waveItem).join('')}</ol>
        </section>

        <section class="section">
          <h2>Família Terrestre</h2>
          <div class="fam">${info.family.map(s => `<span class="fam__chip">${escape(SEAL_PT[s] ?? s)}</span>`).join('')}</div>
        </section>
      `;
    });
  </script>
</body>
</html>
