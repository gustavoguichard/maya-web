<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>V3 · Céu Cósmico — Kin Maia</title>
  <style>
    :root {
      --bg: #0a0e1f;
      --bg-2: #121733;
      --ink: #edebe3;
      --ink-soft: #9892a7;
      --gold: #e5b850;
      --gold-soft: #8f7024;
      --border: rgba(229,184,80,0.18);
      --card: rgba(255,255,255,0.03);

      --c-vermelho: #ef6056;
      --c-branco:   #e8e4d8;
      --c-azul:     #6ea6f3;
      --c-amarelo:  #e5b850;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 15px/1.6 "Inter", ui-sans-serif, -apple-system, system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 900px 600px at 50% -20%, rgba(142, 116, 230, 0.28), transparent 65%),
        radial-gradient(ellipse 700px 500px at 90% 110%, rgba(229, 184, 80, 0.14), transparent 60%),
        radial-gradient(ellipse 600px 400px at -10% 80%, rgba(98, 132, 195, 0.18), transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: "";
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 20% 30%, #fff 50%, transparent),
        radial-gradient(1.5px 1.5px at 80% 10%, #fff 50%, transparent),
        radial-gradient(1px 1px at 60% 65%, #fff 50%, transparent),
        radial-gradient(1.5px 1.5px at 15% 80%, #fff 50%, transparent),
        radial-gradient(1px 1px at 90% 50%, #fff 50%, transparent),
        radial-gradient(2px 2px at 35% 55%, #fff 50%, transparent),
        radial-gradient(1px 1px at 50% 20%, #fff 50%, transparent),
        radial-gradient(1px 1px at 70% 85%, #fff 50%, transparent),
        radial-gradient(1.5px 1.5px at 5% 40%, #fff 50%, transparent),
        radial-gradient(1px 1px at 95% 75%, #fff 50%, transparent);
      background-repeat: no-repeat;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.25rem 5rem;
    }

    .nav {
      display: flex; justify-content: space-between;
      font-size: 0.8rem; color: var(--ink-soft);
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
    }
    .nav a { color: var(--gold); text-decoration: none; }

    .hero { text-align: center; margin-bottom: 2rem; }
    .hero .mark { font-size: 2rem; color: var(--gold); }
    h1 {
      font-family: ui-serif, "Cormorant Garamond", "Playfair Display", Georgia, serif;
      font-size: 2.1rem;
      font-weight: 500;
      margin: 0.35rem 0 0.35rem;
      letter-spacing: -0.005em;
    }
    .sub { color: var(--ink-soft); margin: 0; font-size: 0.92rem; letter-spacing: 0.02em; }

    form {
      display: flex; gap: 0.5rem;
      margin: 2.25rem 0;
    }
    input[type="date"] {
      flex: 1;
      font: inherit;
      padding: 0.75rem 1rem;
      color: var(--ink);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color-scheme: dark;
    }
    input[type="date"]:focus, button:focus { outline: 1px solid var(--gold); outline-offset: 2px; }
    button {
      font: inherit;
      font-weight: 600;
      padding: 0.75rem 1.2rem;
      background: var(--gold);
      color: var(--bg);
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.03em;
    }

    .kc {
      position: relative;
      padding: 2.25rem 1.5rem 1.75rem;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      text-align: center;
      margin-bottom: 1.75rem;
      overflow: hidden;
    }
    .kc::before {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, var(--glow, rgba(110,166,243,0.4)), transparent 60%);
      pointer-events: none;
      opacity: 0.7;
    }
    .kc--vermelho { --glow: rgba(239,96,86,0.4); --accent: var(--c-vermelho); }
    .kc--branco   { --glow: rgba(232,228,216,0.3); --accent: var(--c-branco); }
    .kc--azul     { --glow: rgba(110,166,243,0.45); --accent: var(--c-azul); }
    .kc--amarelo  { --glow: rgba(229,184,80,0.45); --accent: var(--c-amarelo); }

    .kc__eyebrow {
      position: relative;
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    .kc__emoji {
      position: relative;
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 0.25rem;
      filter: drop-shadow(0 0 30px var(--glow));
    }
    .kc__name {
      position: relative;
      font-family: ui-serif, "Cormorant Garamond", Georgia, serif;
      font-size: 2.5rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--accent);
      margin: 0.25rem 0 0.75rem;
    }
    .kc__tone {
      position: relative;
      display: inline-flex; align-items: center; gap: 0.75rem;
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 999px;
    }
    .tone-glyph { fill: var(--gold); width: 40px; }
    .kc__tone-name { font-family: ui-serif, Georgia, serif; font-style: italic; font-size: 0.95rem; color: var(--ink); }
    .kc__kin {
      position: relative;
      margin-top: 1.25rem;
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--ink-soft);
    }
    .kc__kin b { color: var(--gold); font-weight: 400; }

    .section { margin-top: 2rem; }
    .section__title {
      display: flex; align-items: center; gap: 0.6rem;
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 0.85rem;
    }
    .section__title::before { content: "✦"; }

    .rel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    @media (max-width: 480px) { .rel-grid { grid-template-columns: 1fr; } }
    .rel {
      padding: 0.85rem 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .rel__label { font-family: ui-monospace, monospace; font-size: 0.7rem; color: var(--gold); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 0.25rem; }
    .rel__kin { font-family: ui-serif, Georgia, serif; font-size: 1.05rem; }

    .list {
      list-style: none; margin: 0; padding: 0.5rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    }
    .list li { display: flex; align-items: center; gap: 0.7rem; padding: 0.5rem 0.75rem; border-radius: 8px; }
    .list__hl { background: rgba(229,184,80,0.08); border: 1px solid var(--border); }
    .list__num { color: var(--gold-soft); font-family: ui-monospace, monospace; width: 1.5rem; text-align: right; font-size: 0.82rem; }
    .list__emoji { font-size: 1.05rem; filter: saturate(0.9); }
    .list__name { font-family: ui-serif, Georgia, serif; }
  </style>
</head>
<body>
  <main>
    <div class="nav">
      <span>V3 · Céu Cósmico</span>
      <a href="index.html">Ver os 5 →</a>
    </div>

    <header class="hero">
      <div class="mark">✦</div>
      <h1>Calculadora do Kin Maia</h1>
      <p class="sub">Uma noite no Tzolkin — 260 estrelas, 20 selos, 13 tons.</p>
    </header>

    <form id="form" autocomplete="off">
      <input type="date" id="date" required aria-label="Data">
      <button type="submit">Consultar</button>
    </form>

    <section id="result" aria-live="polite"></section>
  </main>

  <script type="module">
    import { setupForm, toneSvg, prettyKin, parseKinName, escape,
             SEAL_PT, TONE_PT, TONE_NUMBER, SEAL_EMOJI, COLOR_CSS } from './shared.js';

    setupForm((info) => {
      const colorClass = COLOR_CSS[info.color] ?? 'azul';
      const toneNum = TONE_NUMBER[info.tone] ?? 1;
      const currentSeal = info.seal;

      const relCard = (label, kin) => {
        const { seal } = parseKinName(kin);
        return `<div class="rel">
          <div class="rel__label">${label}</div>
          <div class="rel__kin">${SEAL_EMOJI[seal] ?? ''} ${escape(prettyKin(kin))}</div>
        </div>`;
      };

      const waveItem = (kin, i) => {
        const { seal } = parseKinName(kin);
        const hl = seal === currentSeal ? 'list__hl' : '';
        return `<li class="${hl}"><span class="list__num">${String(i+1).padStart(2,'0')}</span><span class="list__emoji">${SEAL_EMOJI[seal] ?? ''}</span><span class="list__name">${escape(prettyKin(kin))}</span></li>`;
      };

      const famItem = (s) => `<li><span class="list__emoji">${SEAL_EMOJI[s] ?? ''}</span><span class="list__name">${escape(SEAL_PT[s] ?? s)}</span></li>`;

      return `
        <article class="kc kc--${colorClass}">
          <div class="kc__eyebrow">Kin ${info.number} — ${escape(info.color)}</div>
          <div class="kc__emoji">${SEAL_EMOJI[info.seal] ?? '✦'}</div>
          <h2 class="kc__name">${escape(SEAL_PT[info.seal] ?? info.seal)}</h2>
          <div class="kc__tone">
            ${toneSvg(toneNum, { width: 44, dotR: 3, dotGap: 5, barH: 5, barW: 32, gap: 3 })}
            <span class="kc__tone-name">${escape(TONE_PT[info.tone] ?? info.tone)}</span>
          </div>
          <div class="kc__kin"><b>${info.number}</b> / 260</div>
        </article>

        <section class="section">
          <h2 class="section__title">Constelação de relações</h2>
          <div class="rel-grid">
            ${relCard('Guia', info.guide)}
            ${relCard('Análogo', info.analog)}
            ${relCard('Antípoda', info.antipode)}
            ${relCard('Oculto', info.hidden)}
          </div>
        </section>

        <section class="section">
          <h2 class="section__title">Onda encantada</h2>
          <ol class="list">${info.wavespell.map(waveItem).join('')}</ol>
        </section>

        <section class="section">
          <h2 class="section__title">Família terrestre</h2>
          <ul class="list">${info.family.map(famItem).join('')}</ul>
        </section>
      `;
    });
  </script>
</body>
</html>
