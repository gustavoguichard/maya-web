<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>V4 · Editorial — Kin Maia</title>
  <style>
    :root {
      --bg: #fafaf5;
      --ink: #14141a;
      --ink-soft: #6a6a70;
      --rule: #1a1a22;
      --rule-faint: #e5e5de;
      --paper: #fdfcf6;

      --c-vermelho: #c2362f;
      --c-branco:   #737382;
      --c-azul:     #2b4d8f;
      --c-amarelo:  #b8861b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #12120f;
        --ink: #eeebe0;
        --ink-soft: #9e9c93;
        --rule: #e7e5d8;
        --rule-faint: #28281f;
        --paper: #18180f;

        --c-vermelho: #e06961;
        --c-branco:   #b4b4c2;
        --c-azul:     #7da3db;
        --c-amarelo:  #ecbf48;
      }
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.6 ui-sans-serif, "Inter", -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .serif { font-family: ui-serif, "Playfair Display", "Cormorant Garamond", Georgia, "Times New Roman", serif; }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    .masthead {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 1rem;
      align-items: center;
      padding-bottom: 0.65rem;
      border-bottom: 3px double var(--rule);
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 2rem;
    }
    .masthead a { color: inherit; text-decoration: none; }
    .masthead a:hover { color: var(--ink); }
    .masthead__title { text-align: center; letter-spacing: 0.3em; color: var(--ink); }

    .hero {
      text-align: center;
      padding: 1.5rem 0 2rem;
      border-bottom: 1px solid var(--rule-faint);
      margin-bottom: 2rem;
    }
    .hero__kicker {
      font-size: 0.78rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-soft);
    }
    h1 {
      font-family: ui-serif, "Playfair Display", Georgia, serif;
      font-weight: 400;
      font-size: 3rem;
      line-height: 1.05;
      letter-spacing: -0.015em;
      margin: 0.65rem 0 0.5rem;
    }
    .dek {
      font-family: ui-serif, Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--ink-soft);
      margin: 0;
    }

    form {
      display: flex; gap: 0.5rem; align-items: center;
      padding: 0.65rem 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      margin-bottom: 2.5rem;
    }
    form label {
      font-size: 0.74rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft);
      padding-left: 0.25rem;
    }
    input[type="date"] {
      flex: 1; font: inherit; font-family: ui-serif, Georgia, serif; font-size: 1.05rem;
      color: var(--ink); background: transparent; border: 0;
      padding: 0.35rem 0.4rem;
    }
    input[type="date"]:focus, button:focus { outline: 1px solid var(--ink); }
    button {
      font-family: ui-serif, Georgia, serif;
      font-size: 0.95rem;
      font-style: italic;
      padding: 0.35rem 1rem;
      background: var(--ink); color: var(--bg);
      border: 0; cursor: pointer;
    }

    /* --- Kin article --- */

    .kc {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2rem;
      align-items: end;
      padding: 1.5rem 0 1.5rem;
      border-bottom: 1px solid var(--rule-faint);
      margin-bottom: 1.5rem;
    }
    .kc__left { min-width: 0; }
    .kc__right { text-align: right; position: relative; }
    .kc__bignum {
      font-family: ui-serif, "Playfair Display", Georgia, serif;
      font-weight: 300;
      font-size: clamp(5rem, 22vw, 9rem);
      line-height: 0.9;
      color: var(--c, var(--c-azul));
      letter-spacing: -0.04em;
    }
    .kc__bignum sup {
      font-size: 0.28em;
      color: var(--ink-soft);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 400;
      top: -2em;
      margin-left: 0.4rem;
    }
    .kc__kicker {
      font-size: 0.78rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-soft); margin-bottom: 0.85rem;
    }
    .kc__kicker .chip {
      display: inline-block;
      padding: 0.12rem 0.55rem;
      border: 1px solid currentColor;
      margin-left: 0.35rem;
    }
    .kc--vermelho { --c: var(--c-vermelho); }
    .kc--branco   { --c: var(--c-branco); }
    .kc--azul     { --c: var(--c-azul); }
    .kc--amarelo  { --c: var(--c-amarelo); }
    .kc__name {
      font-family: ui-serif, "Playfair Display", Georgia, serif;
      font-weight: 400;
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      line-height: 1;
      letter-spacing: -0.02em;
      margin: 0 0 0.5rem;
    }
    .kc__name::first-letter { color: var(--c); }
    .kc__tone-line {
      display: flex; align-items: center; gap: 0.75rem;
      font-family: ui-serif, Georgia, serif;
      font-style: italic;
      color: var(--ink-soft);
    }
    .tone-glyph { fill: var(--c); width: 42px; }
    .kc__emoji-big {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 0.5rem;
      display: block;
    }

    /* Sections */

    .section { margin-top: 2rem; }
    .section__title {
      font-family: ui-serif, Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-size: 1.35rem;
      margin: 0 0 0.85rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--rule);
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .section__title small {
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-style: normal;
      font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-soft);
    }

    .rel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 2rem; }
    .rel {
      padding: 0.9rem 0;
      border-bottom: 1px dashed var(--rule-faint);
    }
    .rel__label {
      font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-soft); margin-bottom: 0.15rem;
    }
    .rel__kin {
      font-family: ui-serif, Georgia, serif;
      font-size: 1.05rem;
    }

    .wave {
      columns: 2;
      column-gap: 2rem;
      padding-left: 1.1rem;
    }
    .wave li {
      font-family: ui-serif, Georgia, serif;
      padding: 0.25rem 0;
      break-inside: avoid;
    }
    .wave .curr { color: var(--c); font-weight: 600; }

    .fam { display: flex; flex-wrap: wrap; gap: 0 1rem; font-family: ui-serif, Georgia, serif; }
    .fam li { padding: 0.35rem 0; }
    .fam li:not(:last-child)::after { content: " ·"; color: var(--ink-soft); margin-left: 0.5rem; }

    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 3px double var(--rule);
      text-align: center;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
  </style>
</head>
<body>
  <main>
    <header class="masthead">
      <span>Vol. I · Nº 260</span>
      <span class="masthead__title">O Tzolkin</span>
      <a href="index.html">← Índice</a>
    </header>

    <section class="hero">
      <div class="hero__kicker">Edição · V4 · Editorial</div>
      <h1>Calculadora do Kin</h1>
      <p class="dek">Vinte selos, treze tons, duzentos e sessenta dias. <br>A crônica diária do Tzolkin maia.</p>
    </section>

    <form id="form" autocomplete="off">
      <label for="date">Data</label>
      <input type="date" id="date" required>
      <button type="submit">Publicar</button>
    </form>

    <section id="result" aria-live="polite"></section>

    <footer>Fim da edição</footer>
  </main>

  <script type="module">
    import { setupForm, toneSvg, prettyKin, parseKinName, escape,
             SEAL_PT, TONE_PT, TONE_NUMBER, SEAL_EMOJI, COLOR_CSS } from './shared.js';

    setupForm((info) => {
      const colorClass = COLOR_CSS[info.color] ?? 'azul';
      const toneNum = TONE_NUMBER[info.tone] ?? 1;
      const currentSeal = info.seal;

      const rel = (label, kin) => `
        <div class="rel">
          <div class="rel__label">${label}</div>
          <div class="rel__kin">${escape(prettyKin(kin))}</div>
        </div>`;

      const waveItem = (kin, i) => {
        const { seal } = parseKinName(kin);
        const curr = seal === currentSeal ? 'curr' : '';
        return `<li class="${curr}">${escape(prettyKin(kin))}</li>`;
      };

      return `
        <article class="kc kc--${colorClass}">
          <div class="kc__left">
            <div class="kc__kicker">Kin · ${escape(info.color)}<span class="chip">${escape(info.color)}</span></div>
            <span class="kc__emoji-big">${SEAL_EMOJI[info.seal] ?? '✦'}</span>
            <h2 class="kc__name">${escape(SEAL_PT[info.seal] ?? info.seal)}</h2>
            <div class="kc__tone-line">
              ${toneSvg(toneNum, { width: 46, dotR: 3.5, dotGap: 5, barH: 5, barW: 34, gap: 3 })}
              <span>tom ${toneNum} — ${escape(TONE_PT[info.tone] ?? info.tone)}</span>
            </div>
          </div>
          <div class="kc__right">
            <div class="kc__bignum">${info.number}<sup>/260</sup></div>
          </div>
        </article>

        <section class="section">
          <h2 class="section__title">Relações <small>quatro aspectos</small></h2>
          <div class="rel-grid">
            ${rel('Guia', info.guide)}
            ${rel('Análogo', info.analog)}
            ${rel('Antípoda', info.antipode)}
            ${rel('Oculto', info.hidden)}
          </div>
        </section>

        <section class="section">
          <h2 class="section__title">Onda Encantada <small>13 dias</small></h2>
          <ol class="wave">${info.wavespell.map(waveItem).join('')}</ol>
        </section>

        <section class="section">
          <h2 class="section__title">Família Terrestre <small>4 selos</small></h2>
          <ul class="fam">${info.family.map(s => `<li>${escape(SEAL_PT[s] ?? s)}</li>`).join('')}</ul>
        </section>
      `;
    });
  </script>
</body>
</html>
