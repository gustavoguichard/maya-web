<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kin Maia — Calculadora do Tzolkin</title>
  <meta name="description" content="Descubra seu Kin no calendário Tzolkin maia. Informe uma data e veja selo, tom, cor, oráculo e onda encantada.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="./tailwind.css">
</head>
<body class="relative min-h-screen overflow-x-hidden bg-bg text-ink font-sans antialiased">
  <main class="relative z-10 mx-auto max-w-[640px] px-5 pt-12 pb-20">
    <header class="text-center mb-8">
      <div class="text-[2rem] text-gold">✦</div>
      <h1 class="font-serif text-[2.1rem] font-medium my-[0.35rem] -tracking-[0.005em]">Calculadora do Kin Maia</h1>
      <p class="text-ink-soft mx-auto max-w-[30rem] text-[0.92rem] tracking-[0.02em]">
        Informe uma data abaixo para descobrir o Kin do dia — seu selo, tom, cor, oráculo e onda encantada no Tzolkin.
      </p>
    </header>

    <form id="form" class="flex gap-2 my-9" autocomplete="off">
      <input
        type="date"
        id="date"
        required
        aria-label="Data"
        class="flex-1 px-4 py-3 text-ink bg-white/[0.03] border border-gold/20 rounded-[10px] focus:outline-none focus-visible:outline focus-visible:outline-1 focus-visible:outline-gold focus-visible:outline-offset-2"
      >
      <button
        type="submit"
        class="font-semibold px-[1.2rem] py-3 bg-gold text-bg border-0 rounded-[10px] cursor-pointer tracking-[0.03em] focus:outline-none focus-visible:outline focus-visible:outline-1 focus-visible:outline-gold focus-visible:outline-offset-2"
      >
        Consultar
      </button>
    </form>

    <section id="result" aria-live="polite"></section>

    <footer class="mt-12 text-ink-soft text-center text-[0.78rem] tracking-[0.02em]">
      Baseado no sistema <strong>Dreamspell</strong> de José Argüelles.
      Porte em <a href="https://github.com/gustavoguichard/maya-web" target="_blank" rel="noopener" class="text-gold no-underline">PureScript</a> da
      <a href="https://github.com/gustavoguichard/maya" target="_blank" rel="noopener" class="text-gold no-underline">biblioteca original em Haskell</a>.
    </footer>
  </main>

  <script type="module">
    import {
      setupForm, toneSvg, sealImg, parseKinName, escape,
      SEAL_PT, TONE_PT, TONE_NUMBER,
    } from './shared.js';

    // --- Color → utility-class map for per-kin theming ---

    const TEXT_COLOR = {
      Vermelho: 'text-maya-red',
      Branco:   'text-maya-white',
      Azul:     'text-maya-blue',
      Amarelo:  'text-maya-yellow',
    };

    const GLOW = {
      Vermelho: 'rgba(239, 96, 86, 0.4)',
      Branco:   'rgba(232, 228, 216, 0.3)',
      Azul:     'rgba(110, 166, 243, 0.45)',
      Amarelo:  'rgba(229, 184, 80, 0.45)',
    };

    // Mini tone numeral used inside oracle and onda cells.
    const miniTone = (n, className) => toneSvg(n, {
      width: 22, dotR: 1.4, dotGap: 2, barH: 1.8, barW: 14, gap: 1.3,
      className: `block ${className}`,
    });

    // Fixed cross positions for the oráculo.
    const ORACLE_POS = {
      guia:     'col-start-2 row-start-1',
      antipoda: 'col-start-1 row-start-2',
      center:   'col-start-2 row-start-2',
      analogo:  'col-start-3 row-start-2',
      oculto:   'col-start-2 row-start-3',
    };

    // Classical U layout (opens upward). Index is tone-1 (0..12).
    const ONDA_POS = [
      { col: 1, row: 1 }, { col: 1, row: 2 }, { col: 1, row: 3 },
      { col: 1, row: 4 }, { col: 1, row: 5 }, { col: 2, row: 5 },
      { col: 3, row: 5 }, { col: 4, row: 5 }, { col: 5, row: 5 },
      { col: 5, row: 4 }, { col: 5, row: 3 }, { col: 5, row: 2 },
      { col: 4, row: 2 },
    ];

    setupForm((info) => {
      const toneNum = TONE_NUMBER[info.tone] ?? 1;
      const glow = GLOW[info.color] ?? GLOW.Azul;
      const accentClass = TEXT_COLOR[info.color] ?? 'text-ink';

      // --- Oráculo cell ---
      const oracleCell = (slot, label, kinName) => {
        const { seal, tone, color } = parseKinName(kinName);
        const toneN = TONE_NUMBER[tone] ?? 1;
        const cellAccent = TEXT_COLOR[color] ?? 'text-ink';
        const isCenter = slot === 'center';
        return `
          <div class="relative z-10 flex flex-col items-center gap-1 px-[0.6rem] pt-[0.7rem] pb-3 rounded-xl border text-center ${ORACLE_POS[slot]} ${isCenter ? 'bg-white/[0.03] border-gold/40' : 'bg-bg border-gold/20'}">
            <div class="font-mono text-[0.62rem] tracking-[0.2em] uppercase text-gold">${label}</div>
            <div class="flex justify-center">${miniTone(toneN, 'fill-ink')}</div>
            <div>${sealImg(seal, { size: isCenter ? 48 : 30, className: `block ${isCenter ? 'w-12 h-12 max-[420px]:w-10 max-[420px]:h-10' : 'w-[30px] h-[30px] max-[420px]:w-[26px] max-[420px]:h-[26px]'}` })}</div>
            <div class="font-serif leading-[1.15] ${isCenter ? `text-base ${cellAccent}` : 'text-[0.82rem] text-ink max-[420px]:text-[0.75rem]'}">${escape(SEAL_PT[seal] ?? seal)}</div>
          </div>`;
      };

      // --- Onda cell ---
      const GATE_POSITIONS = new Set([0, 4, 8, 12]);
      const ondaCell = (kinName, i) => {
        const { seal, tone, color } = parseKinName(kinName);
        const pos = ONDA_POS[i];
        const toneN = TONE_NUMBER[tone] ?? (i + 1);
        const isCurrent =
          seal === info.seal && tone === info.tone && color === info.color;
        const isGate = GATE_POSITIONS.has(i);

        let cellBg   = 'bg-white/[0.03]';
        let cellBorder = 'border-gold/20';
        let extra    = '';
        let toneFill = 'fill-ink';
        if (isCurrent) {
          cellBg = 'bg-[rgb(229_184_80/0.1)]';
          cellBorder = 'border-gold';
          extra = 'shadow-[inset_0_0_0_1px_var(--color-gold),0_0_24px_-6px_rgb(229_184_80/0.4)]';
          toneFill = 'fill-gold';
        } else if (isGate) {
          cellBg = 'bg-[rgb(58_138_82/0.22)]';
          cellBorder = 'border-[rgb(86_176_110/0.6)]';
        }

        return `
          <div class="relative flex flex-col items-center gap-[0.2rem] px-[0.35rem] pt-2 pb-[0.55rem] min-h-[72px] text-center border rounded-[10px] ${cellBg} ${cellBorder} ${extra} max-[520px]:min-h-[58px] max-[520px]:px-[0.2rem] max-[520px]:pt-[0.35rem] max-[520px]:pb-[0.4rem]"
               style="grid-column:${pos.col}; grid-row:${pos.row}">
            <div class="flex justify-center">${miniTone(toneN, toneFill)}</div>
            <div>${sealImg(seal, { size: 26, className: 'block w-[26px] h-[26px] max-[520px]:w-[22px] max-[520px]:h-[22px]' })}</div>
            <div class="font-serif text-[0.7rem] leading-[1.1] text-ink max-[520px]:text-[0.62rem]">${escape(SEAL_PT[seal] ?? seal)}</div>
          </div>`;
      };

      const famItem = (s) => `
        <li class="flex items-center gap-[0.7rem] px-3 py-2 rounded-lg">
          <span class="inline-flex">${sealImg(s, { size: 24, className: 'block w-6 h-6' })}</span>
          <span class="font-serif">${escape(SEAL_PT[s] ?? s)}</span>
        </li>`;

      return `
        <article
          class="relative overflow-hidden px-6 pt-9 pb-7 mb-9 rounded-[18px] bg-white/[0.03] border border-gold/20 text-center before:content-[''] before:absolute before:inset-0 before:pointer-events-none before:opacity-70 before:[background:radial-gradient(circle_at_50%_0%,var(--glow),transparent_60%)]"
          style="--glow:${glow}"
        >
          <div class="relative font-mono text-[0.72rem] tracking-[0.28em] uppercase text-gold mb-4">Kin ${info.number} — ${escape(info.color)}</div>
          <div class="relative inline-flex mb-1" style="filter:drop-shadow(0 0 24px var(--glow))">${sealImg(info.seal, { size: 88, className: 'block w-[88px] h-[88px]' })}</div>
          <h2 class="relative font-serif text-[2.5rem] font-medium my-1 mb-3 -tracking-[0.01em] ${accentClass}">${escape(SEAL_PT[info.seal] ?? info.seal)}</h2>
          <div class="relative inline-flex items-center gap-3 px-[1.1rem] py-[0.55rem] rounded-full border border-gold/20">
            ${toneSvg(toneNum, { width: 44, dotR: 3, dotGap: 5, barH: 5, barW: 32, gap: 3, className: 'w-10 fill-gold' })}
            <span class="font-serif italic text-[0.95rem] text-ink">${escape(TONE_PT[info.tone] ?? info.tone)}</span>
          </div>
          <div class="relative mt-5 font-mono text-xs tracking-[0.25em] text-ink-soft"><b class="font-normal text-gold">${info.number}</b> / 260</div>
        </article>

        <section class="mt-10">
          <h2 class="flex items-center justify-center gap-[0.6rem] font-mono text-[0.72rem] tracking-[0.28em] uppercase text-gold mb-5 before:content-['✦'] before:text-gold-soft after:content-['✦'] after:text-gold-soft">Oráculo</h2>
          <div class="relative grid grid-cols-3 gap-3 before:content-[''] before:absolute before:pointer-events-none before:left-1/2 before:top-[12%] before:w-px before:h-[76%] before:-translate-x-[0.5px] before:[background:var(--oracle-line-v)] after:content-[''] after:absolute after:pointer-events-none after:left-[12%] after:top-1/2 after:h-px after:w-[76%] after:-translate-y-[0.5px] after:[background:var(--oracle-line-h)]">
            ${oracleCell('guia', 'Guia', info.guide)}
            ${oracleCell('antipoda', 'Antípoda', info.antipode)}
            ${oracleCell('center', 'Kin ' + info.number, info.seal + ' ' + info.tone + ' ' + info.color)}
            ${oracleCell('analogo', 'Análogo', info.analog)}
            ${oracleCell('oculto', 'Oculto', info.hidden)}
          </div>
        </section>

        <section class="mt-10">
          <h2 class="flex items-center justify-center gap-[0.6rem] font-mono text-[0.72rem] tracking-[0.28em] uppercase text-gold mb-5 before:content-['✦'] before:text-gold-soft after:content-['✦'] after:text-gold-soft">Onda Encantada</h2>
          <div class="relative grid grid-cols-5 gap-[0.45rem] max-[520px]:gap-[0.3rem]" style="grid-template-rows: repeat(5, auto)">
            ${info.wavespell.map(ondaCell).join('')}
          </div>
        </section>

        <section class="mt-10">
          <h2 class="flex items-center justify-center gap-[0.6rem] font-mono text-[0.72rem] tracking-[0.28em] uppercase text-gold mb-5 before:content-['✦'] before:text-gold-soft after:content-['✦'] after:text-gold-soft">Família Terrestre</h2>
          <ul class="list-none m-0 p-2 bg-white/[0.03] border border-gold/20 rounded-[14px]">${info.family.map(famItem).join('')}</ul>
        </section>
      `;
    });

  </script>
</body>
</html>
